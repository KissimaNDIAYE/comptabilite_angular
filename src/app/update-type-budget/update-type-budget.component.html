<div class="container">

  <div>
    <h2>Modifier un Type_Budget :</h2>
  </div>

  <!-- Utilisation correcte du submit Angular -->
  <form>

    <!-- ID (désactivé) -->
    <div class="col-sm-2 col-md-2 col-lg-2"> 
      <label>ID Type_Budget</label> 
      <input type="number" [(ngModel)]="currentType_Budget.idType_Budget" name="idType_Budget" class="form-control" disabled>
    </div>

    <!-- Description -->
    <div class="col-sm-4 col-md-4 col-lg-4"> 
      <label>Type_Budget</label> 
      <input type="text" [(ngModel)]="currentType_Budget.budgetTypeDesc" name="budgetTypeDesc" class="form-control" required >
    </div> 

    <!-- Bouton -->
    <div class="mt-2"> 
      <button type="submit" (click)="updateType_Budget()" class="btn btn-success">
        Modifier
      </button> 
    </div>

    <!-- Message -->
    <div class="mt-2">
      <h3>{{message}}</h3>
    </div>

  </form>

</div>
