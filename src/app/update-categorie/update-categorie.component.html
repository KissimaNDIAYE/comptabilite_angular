<div class="container">
    <div>
        <h2>Modifier un Categorie :</h2>
    </div>
    <form>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>ID Categorie</label> 
            <input type="number" [(ngModel)]="currentCategorie.idCategorie" name="idCategorie" class="form-control">
        </div>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>Description</label> 
            <input type="text" [(ngModel)]="currentCategorie.descriptionCat" name="descriptionCategorieTaxe" class="form-control"> 
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4"> 
            <label>valeur Fixe</label> 
            <input type="text" [(ngModel)]="currentCategorie.valeurFixeFL" name="valeurFixeFL" class="form-control"> 
        </div>
        <div class="mt-2"> 
            <button type="submit" (click)="updateCategorie()" class="btn btn-success">Modifier</button> 
        </div>

        <div class="mt-2">
            <h3>{{message}}</h3>
        </div>
    </form>
    
</div>
