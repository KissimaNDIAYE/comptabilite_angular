<div class="container">
    <div>
        <h2>Ajouter un Type_Impot :</h2>
    </div>
    <form>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>ID Type_Impot</label> 
            <input type="number" [(ngModel)]="newType_Impot.idType_Impot" name="idType_Impot" class="form-control">
        </div>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>Description</label> 
            <input type="text" [(ngModel)]="newType_Impot.typeImpotDesc" name="typeImpotDesc" class="form-control"> 
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4"> 
        <label>Categorie</label> 
            <select class="form-control form-control-lg" id="idCategorie" name="idCategorie" [(ngModel)]="newIdCat"> 
                <option *ngFor="let cat of categories" [value]="cat.idCategorie">{{cat.descriptionCat}}</option>
            </select>
        </div> 
        <div class="mt-2"> 
            <button type="submit" (click)="addType_Impot()" class="btn btn-success">Ajouter</button> 
        </div>

        <div class="mt-2">
            <h3>{{message}}</h3>
        </div>
    </form>
    
</div>
