<div class="container">
    <div>
        <h2>Ajouter un Type_Budget :</h2>
    </div>
    <form>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>ID Type_Budget</label> 
            <input type="number" [(ngModel)]="newType_Budget.idType_Budget" name="idType_Budget" class="form-control">
        </div>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>Description</label> 
            <input type="text" [(ngModel)]="newType_Budget.budgetTypeDesc" name="budgetTypeDesc" class="form-control"> 
        </div>
        
        <div class="mt-2"> 
            <button type="submit" (click)="addType_Budget()" class="btn btn-success">Ajouter</button> 
        </div>

        <div class="mt-2">
            <h3>{{message}}</h3>
        </div>
    </form>
    
</div>
