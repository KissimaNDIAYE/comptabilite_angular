<div class="container">
    <div>
        <h2>Ajouter un budget :</h2>
    </div>
    <form>
        <div hidden="true" class="col-sm-2 col-md-2 col-lg-2"> 
            <label>ID Budget</label> 
            <input type="number" [(ngModel)]="newType_budget.IdType_Budget" name="idTypeBudget" class="form-control">
        </div>
        <div class="col-sm-2 col-md-2 col-lg-2"> 
            <label>Description</label> 
            <input type="text" [(ngModel)]="newType_budget.budgetTypeDesc" name="descriptionTypeBudget" class="form-control"> 
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4"> 
            <label>valeur Fixe</label> 
            <input type="text" [(ngModel)]="newType_budget.valeurFixeFL" name="valeurFixeFL" class="form-control"> 
        </div>
        <div class="mt-2"> 
            <button type="submit" (click)="addType_Budget()" class="btn btn-success">Ajouter</button> 
        </div>

        <div class="mt-2">
            <h3>{{message}}</h3>
        </div>
    </form>
    
</div>
